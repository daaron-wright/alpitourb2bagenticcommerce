<!DOCTYPE html>
<html lang="en">
<head>
<style data-omelette-print-defaults>
@media print {
  @page { margin: 0.5in; }
  h1, h2, h3, h4, h5, h6 { break-after: avoid; }
  figure, table, pre, blockquote, img, svg, li, tr { break-inside: avoid; }
  section, article, [class*="card" i] { break-inside: avoid; }
  img, svg { max-width: 100%; }
  p { orphans: 3; widows: 3; }
}
</style>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Alpitour AI Lab · Co-Creation Walkthrough</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="alpitour/boards.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg-2); }
  #root { height: 100%; }
  .wt-arrow {
    position: fixed; top: 50%; transform: translateY(-50%); z-index: 20;
    width: 52px; height: 52px; border-radius: 999px; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 21px;
    font-family: var(--font-sans); transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
  }
  .wt-arrow:hover:not(:disabled) { transform: translateY(-50%) scale(1.08); }
  .wt-arrow:disabled { opacity: 0.22; cursor: default; }
  .wt-next { right: 22px; background: var(--k-warm-red-50); color: #fff; box-shadow: 0 10px 26px rgba(255,70,45,0.4); }
  .wt-prev { left: 22px; background: #fff; color: var(--fg-1); border: 1px solid var(--border-1); box-shadow: 0 4px 14px rgba(15,23,42,0.12); }
  .wt-step-btn { background: transparent; border: none; cursor: pointer; font-family: var(--font-sans); padding: 0 14px; height: 100%; display: flex; flex-direction: column; justify-content: center; gap: 3px; border-bottom: 3px solid transparent; border-top: 3px solid transparent; min-width: 0; }
  .wt-step-row { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
  .wt-step-title { font-size: 12.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wt-step-time { font-family: var(--font-mono); font-size: 9.5px; color: var(--fg-muted); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
  .wt-toggle { display: flex; background: var(--bg-3); border-radius: 999px; padding: 3px; cursor: pointer; }
  .wt-toggle span { padding: 6px 14px; border-radius: 999px; font-size: 11.5px; font-weight: 600; transition: background 0.12s ease, color 0.12s ease; }
  @media (max-width: 1320px) { .wt-step-title { display: none; } }
  @media (max-width: 1000px) { .wt-step-time { display: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="alpitour/parts.jsx"></script>
<script type="text/babel" src="alpitour/frame.jsx"></script>
<script type="text/babel" src="alpitour/work.jsx"></script>
<script type="text/babel" src="alpitour/close.jsx"></script>
<script type="text/babel" src="alpitour/toolkit.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// flat slide sequence the single arrow walks through
const SLIDES = [
  { phase: "frame",   comp: "Overview",      w: 1680, h: 960,  noEx: true },
  { phase: "frame",   comp: "Contract",      w: 1680, h: 1060 },
  { phase: "frame",   comp: "FutureSuccess", w: 1680, h: 1010 },
  { phase: "provoke", comp: "Problem",       w: 1680, h: 620 },
  { phase: "provoke", comp: "DemoArtifact",  w: 1680, h: 980 },
  { phase: "enact",   comp: "RolePlay",      w: 1680, h: 1160 },
  { phase: "capture", comp: "CommandCenter", w: 1680, h: 880 },
  { phase: "capture", comp: "Blueprint",     w: 1680, h: 1060 },
  { phase: "distill", comp: "Harvest",       w: 1680, h: 1000 },
  { phase: "distill", comp: "MBA",           w: 1680, h: 1040 },
  { phase: "toolkit", comp: "Superpowers",   w: 1680, h: 1060 },
  { phase: "toolkit", comp: "Remix",         w: 1680, h: 980 },
  { phase: "toolkit", comp: "ConceptStudio", w: 1680, h: 1040 },
  { phase: "toolkit", comp: "Theatre",       w: 1680, h: 940 },
  { phase: "toolkit", comp: "AILayer",       w: 1680, h: 980, noEx: true },
];

const WT_LS = "alpitour.walkthrough.v1";
function loadState() {
  let s = { slide: 0, ex: false };
  try { s = { ...s, ...(JSON.parse(localStorage.getItem(WT_LS)) || {}) }; } catch (e) {}
  const sp = new URLSearchParams(location.search);
  const sl = sp.get("slide");
  if (sl !== null) { const n = parseInt(sl, 10) - 1; if (n >= 0 && n < SLIDES.length) s.slide = n; }
  const ph = sp.get("phase");
  if (ph) { const i = SLIDES.findIndex((x) => x.phase === ph); if (i >= 0) s.slide = i; }
  if (s.slide < 0 || s.slide >= SLIDES.length) s.slide = 0;
  return s;
}

function Stage({ w, h, children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0);
  useEffect(() => {
    const el = ref.current;
    const fit = () => { const r = el.getBoundingClientRect(); setScale(Math.min((r.width - 48) / w, (r.height - 36) / h)); };
    fit();
    const ro = new ResizeObserver(fit); ro.observe(el);
    return () => ro.disconnect();
  }, [w, h]);
  return (
    <div ref={ref} style={{ flex: 1, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
      {scale > 0 ? (
        <div style={{ width: w * scale, height: h * scale, flex: "0 0 auto" }}>
          <div style={{ width: w, height: h, transform: `scale(${scale})`, transformOrigin: "top left", boxShadow: "0 18px 50px rgba(15,23,42,0.16)", borderRadius: 10, overflow: "hidden", background: "#fff" }}>
            {children}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function App() {
  const init = useMemo(loadState, []);
  const [slide, setSlide] = useState(init.slide);
  const [ex, setEx] = useState(init.ex);
  const s = SLIDES[slide];
  const Comp = window.AL[s.comp];
  const canEx = !s.noEx;

  useEffect(() => { try { localStorage.setItem(WT_LS, JSON.stringify({ slide, ex })); } catch (e) {} }, [slide, ex]);

  const go = (n) => setSlide(Math.max(0, Math.min(SLIDES.length - 1, n)));
  const goPhase = (ph) => { const i = SLIDES.findIndex((x) => x.phase === ph); if (i >= 0) go(i); };

  useEffect(() => {
    const onKey = (e) => {
      if (e.target && e.target.isContentEditable) return;
      if (e.key === "ArrowRight") go(slide + 1);
      else if (e.key === "ArrowLeft") go(slide - 1);
      else if (e.key.toLowerCase() === "e" && canEx) setEx((v) => !v);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [slide, canEx]);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", fontFamily: "var(--font-sans)", color: "var(--fg-2)" }}>
      {/* header */}
      <header style={{ flex: "0 0 auto", height: 72, background: "#fff", borderBottom: "1px solid var(--border-1)", display: "flex", alignItems: "stretch", padding: "0 24px", gap: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, flex: "0 0 auto" }}>
          <img src="assets/kyndryl-vital-logo.png" alt="Kyndryl Vital" style={{ height: 28, display: "block" }} />
          <span style={{ width: 1, height: 26, background: "var(--border-2)" }}></span>
          <img src="assets/alpitour-world-logo.png" alt="Alpitour World" style={{ height: 26, display: "block" }} />
        </div>

        {/* phase stepper */}
        <nav style={{ flex: 1, display: "flex", alignItems: "stretch", justifyContent: "center", minWidth: 0, overflow: "hidden" }}>
          {window.AL_PHASES.map((p) => {
            const active = p.id === s.phase;
            const subs = SLIDES.filter((x) => x.phase === p.id);
            return (
              <button key={p.id} className="wt-step-btn" onClick={() => goPhase(p.id)} style={{ borderBottomColor: active ? p.color : "transparent", opacity: active ? 1 : 0.5, maxWidth: 180 }}>
                <span className="wt-step-row">
                  <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 16, color: active ? p.color : "var(--fg-muted)" }}>{p.n}</span>
                  <span className="wt-step-title" style={{ fontWeight: active ? 600 : 400, color: active ? "var(--fg-1)" : "var(--fg-muted)" }}>{p.label}</span>
                </span>
                <span className="wt-step-time">
                  {p.time}
                  {subs.length > 1 ? (
                    <span style={{ display: "inline-flex", gap: 3 }}>
                      {subs.map((sub, j) => { const gi = SLIDES.indexOf(sub); return <span key={j} style={{ width: 5, height: 5, borderRadius: 999, background: active && gi === slide ? p.color : "var(--border-2)" }}></span>; })}
                    </span>
                  ) : null}
                </span>
              </button>
            );
          })}
        </nav>

        {/* header right */}
        <div style={{ flex: "0 0 auto", width: 1 }}></div>
      </header>

      <Stage w={s.w} h={s.h}><Comp ex={ex} /></Stage>

      {/* footer */}
      <footer style={{ flex: "0 0 auto", height: 50, background: "#fff", borderTop: "1px solid var(--border-1)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px" }}>
        <span style={{ fontSize: 12, color: "var(--fg-muted)" }}>Kyndryl AI Innovation Lab · Future Travel Desk Studio · EasyBook Next · AlpiGPT · LyteAI · Easybooking</span>
        <span style={{ fontSize: 11.5, color: "var(--fg-subtle)", fontFamily: "var(--font-mono)" }}>{String(slide + 1).padStart(2, "0")} / {String(SLIDES.length).padStart(2, "0")}</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
(async () => {
  // Prepend so page-supplied @page / break rules (deck-stage's margin:0,
  // author CSS) keep source-order precedence over the baseline.
  const baseCss = document.createElement('style');
  baseCss.textContent = "@media print {\n  @page { margin: 0.5cm; }\n  html, body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n  section, article, figure, table { break-inside: avoid; }\n  *, *::before, *::after {\n    animation-delay: -99s !important; animation-duration: .001s !important;\n    animation-iteration-count: 1 !important; animation-fill-mode: both !important;\n    animation-play-state: running !important; transition-duration: 0s !important;\n  }\n}";
  document.head.prepend(baseCss);
  if (document.readyState === 'loading') {
    await new Promise((r) => document.addEventListener('DOMContentLoaded', r, { once: true }));
  }
  let ds = document.querySelector('deck-stage');
  // whenDefined never resolves when nothing registers the element, so only
  // await it when a <deck-stage> tag exists (and race a timeout regardless).
  if (ds && !customElements.get('deck-stage')) {
    try {
      await Promise.race([
        customElements.whenDefined('deck-stage'),
        new Promise((r) => setTimeout(r, 3000)),
      ]);
    } catch (e) {}
    ds = document.querySelector('deck-stage');
  }
  // dc-runtime assigns window.DCLogic at init and mounts into #dc-root on
  // DOMContentLoaded; settle on that subtree so React has rendered before
  // print(). Non-DC pages fall through to weighing body.
  const isDc = !ds && 'DCLogic' in window;
  const settleRoot = ds || (isDc ? document.getElementById('dc-root') : null) || document.body;
  if (settleRoot) {
    // Weigh only content children — skip script/style/template so inline
    // Babel/CSS doesn't register as stable "content" before the framework
    // has mounted anything.
    const MEDIA = 'img,svg,canvas,video,picture,iframe,embed,object';
    const weigh = () => {
      let text = 0, media = 0;
      for (const c of settleRoot.children) {
        const t = c.tagName;
        if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
        text += (c.textContent || '').trim().length;
        media += c.querySelectorAll(MEDIA).length + (c.matches(MEDIA) ? 1 : 0);
      }
      return text + media * 100;
    };
    // "Non-zero and stable" alone is not sufficient to mean rendered: generic
    // body can carry a static shell while async main content is pending, and
    // #dc-root can carry the root DC's static text while child refs are still
    // .sc-placeholder boxes. Gate generic on readyState 'complete', and never
    // accept stability while a dc-runtime placeholder is present.
    const isGeneric = settleRoot === document.body;
    const deadline = Date.now() + 15000;
    let last = -1, stable = 0;
    while (Date.now() < deadline) {
      const n = weigh();
      const ready =
        (!isGeneric || document.readyState === 'complete') &&
        !settleRoot.querySelector('.sc-placeholder');
      if (n > 0 && n === last && ready) { if (++stable >= 2) break; } else { stable = 0; }
      last = n;
      await new Promise((r) => setTimeout(r, 250));
    }
  }
  try { await document.fonts.ready; } catch (e) {}
  // Jump every animation to its end state so print() never captures a slide
  // mid-entrance. Ordering matters: the 0s-transition style must be live
  // BEFORE data-deck-active is set so attribute-keyed transitions don't
  // start a (now-0s) run from the pre-active base.
  const st = document.createElement('style');
  st.textContent = '*,*::before,*::after{animation-delay:-99s !important;animation-duration:.001s !important;animation-iteration-count:1 !important;animation-fill-mode:both !important;animation-play-state:running !important;transition-duration:0s !important}';
  document.head.appendChild(st);
  for (const d of document.querySelectorAll('deck-stage')) {
    for (const c of d.children) {
      const t = c.tagName;
      if (t === 'SCRIPT' || t === 'STYLE' || t === 'TEMPLATE') continue;
      c.setAttribute('data-deck-active', '');
    }
  }
  try {
    const sweep = () => {
      for (const a of document.getAnimations()) {
        try { a.finish(); } catch (e) {
          try { a.currentTime = (a.effect && a.effect.getComputedTiming().duration) || 0; a.pause(); } catch (e2) {}
        }
      }
    };
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
    sweep();
    await new Promise((r) => requestAnimationFrame(r));
  } catch (e) {}
  setTimeout(() => { try { window.print(); } catch (e) {} }, 200);
})();
</script>
</body>
</html>
