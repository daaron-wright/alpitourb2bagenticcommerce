<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnaCredit · Envisioned Target State — Hi-Fi Screens</title>
<link rel="stylesheet" href="colors_and_type.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg-2); }
  #root { height: 100%; }
  .ts-arrow {
    width: 46px; height: 46px; border-radius: 999px; border: none; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 19px;
    font-family: var(--font-sans); transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.12s ease;
  }
  .ts-arrow:hover:not(:disabled) { transform: scale(1.08); }
  .ts-arrow:disabled { opacity: 0.3; cursor: default; }
  .ts-rail-item { cursor: pointer; transition: background 0.14s ease, border-color 0.14s ease; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="bil-os/shell.jsx"></script>
<script type="text/babel" src="bil-os/portal.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SCREENS = [
  { wf: "WF-01", title: "Data intake", comp: "PortalIntake", moments: "D1", color: "#29707A",
    desc: "Version-aware before any policy logic runs — the run starts only on a supported schema." },
  { wf: "WF-02", title: "Validation run", comp: "PortalRun", moments: "D2–D4", color: "#8A4FBF",
    desc: "The deterministic Policy-as-Code layer is authoritative; the agent explains and suggests — never decides." },
  { wf: "WF-03", title: "Exception review", comp: "PortalReview", moments: "D5", color: "#E68A00",
    desc: "Human-in-the-loop — no approval without a reason, written to the Trust Record." },
  { wf: "WF-04", title: "Summary & evidence", comp: "PortalEvidence", moments: "D6–D7", color: "#1F5580",
    desc: "The run replays from this pack alone — chain of custody complete by construction." },
];

const TS_LS = "anacredit.targetstate.screen";

function loadStart() {
  try {
    const sp = new URLSearchParams(location.search).get("wf");
    if (sp !== null) { const n = parseInt(sp, 10) - 1; if (n >= 0 && n < SCREENS.length) return n; }
    const s = parseInt(localStorage.getItem(TS_LS), 10);
    if (s >= 0 && s < SCREENS.length) return s;
  } catch (e) {}
  return 0;
}

/* scale the 1440×900 screen to fit the viewport area */
function ScreenStage({ children }) {
  const ref = useRef(null);
  const [scale, setScale] = useState(0);
  const W = 1440, H = 900;
  useEffect(() => {
    const el = ref.current;
    const fit = () => {
      const r = el.getBoundingClientRect();
      setScale(Math.min((r.width - 8) / W, (r.height - 8) / H));
    };
    fit();
    const ro = new ResizeObserver(fit);
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div ref={ref} style={{ flex: 1, minHeight: 0, display: "flex", alignItems: "center", justifyContent: "center", overflow: "hidden" }}>
      {scale > 0 ? (
        <div style={{ width: W * scale, height: H * scale, flex: "0 0 auto" }}>
          <div style={{ width: W, height: H, transform: `scale(${scale})`, transformOrigin: "top left", borderRadius: 12, overflow: "hidden", boxShadow: "0 24px 64px rgba(15,23,42,0.22)", border: "1px solid var(--border-1)", background: "#fff" }}>
            {children}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function TargetStatePage() {
  const [i, setI] = useState(loadStart);
  const s = SCREENS[i];
  const Comp = window[s.comp];
  const go = (n) => setI(Math.max(0, Math.min(SCREENS.length - 1, n)));

  useEffect(() => { try { localStorage.setItem(TS_LS, String(i)); } catch (e) {} }, [i]);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight") setI((v) => Math.min(SCREENS.length - 1, v + 1));
      else if (e.key === "ArrowLeft") setI((v) => Math.max(0, v - 1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", fontFamily: "var(--font-sans)", color: "var(--fg-2)" }}>
      {/* header */}
      <header style={{ flex: "0 0 auto", height: 70, background: "#fff", borderBottom: "1px solid var(--border-1)", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 26px", gap: 18 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, minWidth: 0 }}>
          <img src="assets/kyndryl-vital-logo.png" alt="Kyndryl Vital" style={{ height: 28, flex: "0 0 auto" }} />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: "0.16em", textTransform: "uppercase", color: "var(--k-warm-red-50)" }}>Envisioned target state · agentic AI process</div>
            <div style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 18, color: "var(--fg-1)", lineHeight: 1.1, marginTop: 2 }}>AnaCredit Validation Portal — hi-fidelity demo</div>
          </div>
        </div>
        <span style={{ flex: "0 0 auto", fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--k-warm-red-50)", border: "1px solid rgba(255,70,45,0.4)", background: "rgba(255,70,45,0.06)", borderRadius: 999, padding: "6px 14px", whiteSpace: "nowrap" }}>
          e2e ~few hours · human in the loop
        </span>
      </header>

      {/* body: rail + viewport */}
      <div style={{ flex: 1, minHeight: 0, display: "flex" }}>
        {/* left rail — the four screens as a flow */}
        <aside style={{ flex: "0 0 290px", background: "#fff", borderRight: "1px solid var(--border-1)", padding: "20px 16px", display: "flex", flexDirection: "column", gap: 10, overflow: "auto" }}>
          <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", color: "var(--fg-muted)", padding: "0 6px 2px" }}>The to-be journey · 4 screens</div>
          {SCREENS.map((sc, k) => {
            const active = k === i;
            return (
              <React.Fragment key={sc.wf}>
                <div className="ts-rail-item" onClick={() => setI(k)} style={{
                  display: "flex", gap: 12, padding: "13px 13px", borderRadius: 10,
                  background: active ? "var(--bg-2)" : "transparent",
                  border: `1px solid ${active ? sc.color : "var(--border-1)"}`,
                  borderLeft: `4px solid ${active ? sc.color : "var(--border-1)"}`,
                }}>
                  <span style={{ width: 30, height: 30, borderRadius: 999, flex: "0 0 auto", background: active ? sc.color : "var(--bg-3)", color: active ? "#fff" : "var(--fg-muted)", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 14 }}>{k + 1}</span>
                  <span style={{ minWidth: 0 }}>
                    <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
                      <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 14.5, color: "var(--fg-1)" }}>{sc.title}</span>
                      <span style={{ fontFamily: "var(--font-mono)", fontSize: 9, color: sc.color, border: `1px solid ${sc.color}`, borderRadius: 999, padding: "1px 6px" }}>{sc.wf}</span>
                    </span>
                    <span style={{ display: "block", fontSize: 11.5, color: "var(--fg-muted)", marginTop: 4, lineHeight: 1.4, textWrap: "pretty" }}>{sc.desc}</span>
                    <span style={{ display: "inline-block", marginTop: 6, fontFamily: "var(--font-mono)", fontSize: 9.5, color: "var(--k-warm-red-50)", background: "rgba(255,70,45,0.06)", border: "1px solid rgba(255,70,45,0.3)", borderRadius: 4, padding: "1px 7px" }}>{sc.moments}</span>
                  </span>
                </div>
                {k < SCREENS.length - 1 ? (
                  <div style={{ textAlign: "center", color: "var(--fg-subtle)", fontSize: 13, lineHeight: 0.4 }}>↓</div>
                ) : null}
              </React.Fragment>
            );
          })}
          <div style={{ marginTop: "auto", paddingTop: 14, fontSize: 10.5, color: "var(--fg-subtle)", lineHeight: 1.5 }}>
            Hi-fi hand-off wireframes · attached to the Demo Contract · use ← / → to step through.
          </div>
        </aside>

        {/* viewport */}
        <div style={{ flex: 1, minWidth: 0, minHeight: 0, display: "flex", flexDirection: "column", background: "var(--bg-2)" }}>
          {/* screen meta bar */}
          <div style={{ flex: "0 0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, padding: "13px 24px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12, minWidth: 0 }}>
              <span style={{ width: 26, height: 26, borderRadius: 999, flex: "0 0 auto", background: s.color, color: "#fff", display: "inline-flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 13 }}>{i + 1}</span>
              <span style={{ fontFamily: "var(--font-display)", fontWeight: 500, fontSize: 17, color: "var(--fg-1)", whiteSpace: "nowrap" }}>{s.title}</span>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--fg-muted)", whiteSpace: "nowrap" }}>{s.wf} · {s.moments}</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, flex: "0 0 auto" }}>
              <button className="ts-arrow" onClick={() => go(i - 1)} disabled={i === 0} aria-label="Previous" style={{ background: "#fff", color: "var(--fg-1)", border: "1px solid var(--border-1)", boxShadow: "0 2px 8px rgba(15,23,42,0.1)" }}>←</button>
              <span style={{ fontFamily: "var(--font-mono)", fontSize: 12, color: "var(--fg-muted)", minWidth: 44, textAlign: "center" }}>{i + 1} / {SCREENS.length}</span>
              <button className="ts-arrow" onClick={() => go(i + 1)} disabled={i === SCREENS.length - 1} aria-label="Next" style={{ background: "var(--k-warm-red-50)", color: "#fff", boxShadow: "0 8px 22px rgba(255,70,45,0.35)" }}>→</button>
            </div>
          </div>
          {/* the screen */}
          <div style={{ flex: 1, minHeight: 0, padding: "0 24px 22px", display: "flex", flexDirection: "column" }}>
            <ScreenStage key={s.wf}>
              {Comp ? <Comp /> : null}
            </ScreenStage>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<TargetStatePage />);
</script>
</body>
</html>
