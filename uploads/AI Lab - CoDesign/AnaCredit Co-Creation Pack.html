<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AnaCredit Co-Creation Pack</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="collateral/collateral.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="image-slot.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  .screen-surface { background: var(--bg-2); width: 100%; height: 100%; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="collateral/sheet-parts.jsx"></script>
<script type="text/babel" src="collateral/canvases-a.jsx"></script>
<script type="text/babel" src="collateral/canvases-b.jsx"></script>
<script type="text/babel" src="collateral/canvases-c.jsx"></script>
<script type="text/babel" src="collateral/personas.jsx"></script>
<script type="text/babel" src="collateral/cocreate.jsx"></script>
<script type="text/babel" src="collateral/cohort.jsx"></script>
<script type="text/babel" src="collateral/pac-schema.jsx"></script>
<script type="text/babel" src="collateral/target-network.jsx"></script>
<script type="text/babel" src="collateral/tobe-journey.jsx"></script>
<script type="text/babel" src="collateral/contract-stage.jsx"></script>
<script type="text/babel" src="bil-os/persona-orb.jsx"></script>
<script type="text/babel" src="bil-os/talk.jsx"></script>
<script type="text/babel" src="bil-os/shell.jsx"></script>
<script type="text/babel" src="bil-os/portal.jsx"></script>

<script type="text/babel">
function CoCreationPack() {
  return (
    <DesignCanvas title="AnaCredit Co-Creation Pack">

      <DCSection
        id="journey"
        title="The journey"
        subtitle="Four co-creation activities build to one demo outcome — toggle any board between template and result"
      >
        <DCArtboard id="journey-board" label="Day at a glance" width={2000} height={700}>
          <JourneyBoard />
        </DCArtboard>
        <DCArtboard id="target-state" label="Current → Agentic AI target state · node network" width={2000} height={1060}>
          <TargetStateNetwork />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="cohort"
        title="The cohort · pre-work foundation"
        subtitle="Ten synthetic personas filled the draft boards — talk to them before and during the session"
      >
        <DCArtboard id="cohort-wall" label="Who's already in the room" width={2000} height={780}>
          <CohortBoard />
        </DCArtboard>
        <DCArtboard id="cohort-talk-claire" label="Talk to persona · Claire Weber" width={1440} height={900}>
          <div className="screen-surface"><ScreenBilTalk personaId="P-BIL-01" /></div>
        </DCArtboard>
        <DCArtboard id="cohort-talk-paul" label="Talk to persona · Paul Faber" width={1440} height={900}>
          <div className="screen-surface"><ScreenBilTalk personaId="P-BIL-06" /></div>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="act-1"
        title="01 · Frame the value"
        subtitle="Baselines confirmed, targets hardened, sponsor decisions read aloud"
      >
        <DCArtboard id="act-value" label="Value Scorecard · toggle" width={1600} height={1187}>
          <ActivityFrame activity={ACTIVITIES[0]}>
            {(filled) => <ValueScorecard blank={!filled} />}
          </ActivityFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="act-2"
        title="02 · Trace one loan"
        subtitle="One real exposure, field by field — stewards named or gaps flagged"
      >
        <DCArtboard id="act-trace" label="One-Loan Trace · toggle" width={1600} height={1187}>
          <ActivityFrame activity={ACTIVITIES[1]}>
            {(filled) => <OneLoanTrace blank={!filled} />}
          </ActivityFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="act-3"
        title="03 · Sort the rules"
        subtitle="Testable statements, authority tags, and a dot-voted first release"
      >
        <DCArtboard id="act-rules" label="Rule Catalogue · toggle" width={1600} height={1187}>
          <ActivityFrame activity={ACTIVITIES[2]}>
            {(filled) => <RuleCatalogue blank={!filled} />}
          </ActivityFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="act-4"
        title="04 · Draw the gates"
        subtitle="Six gates defined live, then stress-tested with a failure scenario"
      >
        <DCArtboard id="act-gates" label="Control Gate Model · toggle" width={1600} height={1187}>
          <ActivityFrame activity={ACTIVITIES[3]}>
            {(filled) => <ControlGateModel blank={!filled} />}
          </ActivityFrame>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="outcome"
        title="05 · The demo outcome"
        subtitle="A frozen P0 scope — plus the Policy-as-Code schema that generates every policy document for the agentic target state"
      >
        <DCArtboard id="outcome-contract" label="Demo Contract · interactive stage · before → after" width={2300} height={1380}>
          <DemoContractStage />
        </DCArtboard>
        <DCArtboard id="outcome-schema" label="Policy-as-Code schema · generates the policy documents" width={1600} height={1131}>
          <PacSchemaBoard />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="handoff"
        title="06 · Hand-off · hi-fi wireframes"
        subtitle="The validation portal the P0 build delivers — attached to the demo contract; every screen footer maps to its demo moments"
      >
        <DCArtboard id="portal-intake" label="WF-01 · Data intake · D1" width={1440} height={900}>
          <div className="screen-surface"><PortalIntake /></div>
        </DCArtboard>
        <DCArtboard id="portal-run" label="WF-02 · Validation run · D2–D4" width={1440} height={900}>
          <div className="screen-surface"><PortalRun /></div>
        </DCArtboard>
        <DCArtboard id="portal-review" label="WF-03 · Exception review · D5" width={1440} height={900}>
          <div className="screen-surface"><PortalReview /></div>
        </DCArtboard>
        <DCArtboard id="portal-evidence" label="WF-04 · Summary &amp; evidence · D6–D7" width={1440} height={900}>
          <div className="screen-surface"><PortalEvidence /></div>
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CoCreationPack />);
</script>
</body>
</html>
